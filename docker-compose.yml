services:
  debmirror-manager:
    build: .
    container_name: debmirror-manager
    env_file:
      - .env
    environment:
      # Interner Container-Port. Nicht für den Host-Port verwenden.
      APP_PORT: "8080"
      TZ: "${APP_TIMEZONE:-Europe/Berlin}"
    ports:
      - "${WEBUI_PORT:-8111}:8080"
    volumes:
      - ${DATA_PATH:-/docker_data/debmirror-manager}/data:/app/data
      - ${DATA_PATH:-/docker_data/debmirror-manager}/logs:/app/logs
      - ${DATA_PATH:-/docker_data/debmirror-manager}/keyrings:/app/keyrings
      - ${DATA_PATH:-/docker_data/debmirror-manager}/import-scripts:/import-scripts
      - ${DATA_PATH:-/docker_data/debmirror-manager}/user-scripts:/user-scripts
      - ${DATA_PATH:-/docker_data/debmirror-manager}/backup:/app/backups
      - ${MIRROR_PATH:-/srv/mirror}:/mirror
    restart: unless-stopped

  mirror-nginx:
    profiles:
      - mirror-http
    image: nginx:alpine
    container_name: debmirror-nginx
    ports:
      - "${MIRROR_HTTP_PORT:-8110}:80"
    volumes:
      - ${MIRROR_PATH:-/srv/mirror}:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
