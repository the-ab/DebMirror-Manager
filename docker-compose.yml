services:
  debmirror-manager:
    image: debmirror-manager:latest
    build: .
    container_name: debmirror-manager
    env_file:
      - .env
    environment:
      # Interner Container-Port. Nicht für den Host-Port verwenden.
      APP_PORT: "8080"
      TZ: "${APP_TIMEZONE:-Europe/Berlin}"
    ports:
      - "${WEBUI_BIND_ADDRESS:-0.0.0.0}:${WEBUI_PORT:-8111}:8080"
    volumes:
      - ${DATA_PATH:-/docker_data/debmirror-manager}/data:/app/data
      - ${DATA_PATH:-/docker_data/debmirror-manager}/logs:/app/logs
      - ${DATA_PATH:-/docker_data/debmirror-manager}/keyrings:/app/keyrings
      - ${DATA_PATH:-/docker_data/debmirror-manager}/import-scripts:/import-scripts
      - ${DATA_PATH:-/docker_data/debmirror-manager}/user-scripts:/user-scripts
      - ${DATA_PATH:-/docker_data/debmirror-manager}/backup:/app/backups
      - ${MIRROR_PATH:-/srv/mirror}:/mirror
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    pids_limit: 512
    healthcheck:
      test: ["CMD-SHELL", "curl -sS -o /dev/null http://127.0.0.1:8080/login || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  mirror-nginx:
    profiles:
      - mirror-http
    image: nginx:1.30.0-alpine@sha256:0272e4604ed93c1792f03695a033a6e8546840f86e0de20a884bb17d2c924883
    container_name: debmirror-nginx
    ports:
      - "${MIRROR_HTTP_BIND_ADDRESS:-0.0.0.0}:${MIRROR_HTTP_PORT:-8110}:80"
    volumes:
      - ${MIRROR_PATH:-/srv/mirror}:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
